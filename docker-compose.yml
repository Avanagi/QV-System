  #   build: ./qv-discovery
  #   container_name: qv-discovery
  #   ports:
  #     - "8761:8761"
  #   networks:
  #     - qv-network

  # 5. Gateway (API Gateway)
  # gateway:
  #   build: ./qv-gateway
  #   container_name: qv-gateway
  #   ports:
  #     - "8080:8080" # Единая точка входа для пользователей и Locust
  #   environment:
  #     EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
  #   depends_on:
  #     - discovery
  #   networks:
  #     - qv-network

  # 6. Voting Service (Ядро)

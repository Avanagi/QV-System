version: '3.8'

networks:
  qv-network:
    driver: bridge

volumes:
  postgres_data:
  geth_data1:
  geth_data2:

services:

  geth-node1:
    image: ethereum/client-go:v1.10.26
    container_name: qv-geth-1
    hostname: geth-node1
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -d /root/.ethereum/geth ]; then
          geth init /root/genesis.json
        fi
        geth --networkid 777 --http --http.addr "0.0.0.0" --http.api "eth,net,web3,personal,miner,admin" --http.corsdomain "*" --http.vhosts "*" --mine --miner.threads 1 --miner.etherbase "0x123463a4b065722e99115d6c222f267d9cabb524" --allow-insecure-unlock --nodiscover
    volumes:
      - ./blockchain-config/genesis.json:/root/genesis.json
      - geth_data1:/root/.ethereum
    ports:
      - "8545:8545"
      - "30303:30303"
    networks:
      - qv-network

  geth-node2:
    image: ethereum/client-go:v1.10.26
    container_name: qv-geth-2
    hostname: geth-node2
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -d /root/.ethereum/geth ]; then
          geth init /root/genesis.json
        fi
        geth --networkid 777 --port 30304 --mine --miner.threads 1 --miner.etherbase "0x123463a4b065722e99115d6c222f267d9cabb524" --nodiscover
    volumes:
      - ./blockchain-config/genesis.json:/root/genesis.json
      - geth_data2:/root/.ethereum
    networks:
      - qv-network

  explorer:
    image: alethio/ethereum-lite-explorer
    container_name: qv-explorer
    ports:
      - "8099:80"
    environment:
      - APP_NODE_URL=http://localhost:8545
    depends_on:
      geth-node1:
        condition: service_started
    networks:
      - qv-network

  postgres:
    image: postgres:15-alpine
    container_name: qv-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qv_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - qv-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: qv-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - qv-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    container_name: qv-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - qv-network

  zipkin:
    image: openzipkin/zipkin
    container_name: qv-zipkin
    ports:
      - "9411:9411"
    networks:
      - qv-network

  discovery:
    build: ./qv-discovery
    container_name: qv-discovery
    ports:
      - "8761:8761"
    networks:
      - qv-network

  gateway:
    build: ./qv-gateway
    container_name: qv-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
    depends_on:
      - discovery
    networks:
      - qv-network

  voting-service:
    build: ./qv-voting
    container_name: qv-voting
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/voting_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
    depends_on:
      postgres:
        condition: service_started
      discovery:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - qv-network

  wallet-service:
    build: ./qv-wallet
    container_name: qv-wallet
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
    depends_on:
      postgres:
        condition: service_started
      discovery:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - qv-network

  blockchain-service:
    build: ./qv-blockchain
    container_name: qv-blockchain
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: qv-redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      BLOCKCHAIN_RPC_URL: http://geth-node1:8545
      BLOCKCHAIN_PRIVATE_KEY: 4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d
    depends_on:
      rabbitmq:
        condition: service_healthy
      discovery:
        condition: service_started
      geth-node1:
        condition: service_started
    networks:
      - qv-network

  history-service:
    build: ./qv-history
    container_name: qv-history
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: qv-redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://qv-zipkin:9411/api/v2/spans
    depends_on:
      rabbitmq:
        condition: service_healthy
      discovery:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - qv-network

  frontend:
    build: ./qv-frontend
    container_name: qv-frontend
    ports:
      - "3000:80"
    networks:
      - qv-network
server:
  port: 8081

spring:
  application:
    name: voting-service
  datasource:
    url: jdbc:postgresql://localhost:5432/voting_db
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  # sync = REST подход
  # async = Saga RabbitMQ подход
  architecture: async

  # Адрес кошелька (через Gateway или напрямую, внутри Docker это wallet-service)
  wallet-url: http://wallet-service:8082/api/wallet/charge
server:
  port: 8081

spring:
  application:
    name: voting-service
  datasource:
    url: jdbc:postgresql://localhost:5432/voting_db
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  architecture: async
  wallet-url: http://wallet-service:8082/api/wallet/charge
  poll-cost: 50.00
  max-budget: 100.0

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
    metrics:
      tags:
        application: ${spring.application.name}
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spring-boot-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'gateway:8080'
          - 'voting-service:8081'
          - 'wallet-service:8082'
          - 'blockchain-service:8083'
          - 'history-service:8084'
server:
  port: 8082

spring:
  application:
    name: wallet-service
  datasource:
    url: jdbc:postgresql://localhost:5432/wallet_db
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  chaos:
    enabled: false
    rate: 0.1
  initial-balance: 1000.00

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
    metrics:
      tags:
        application: ${spring.application.name}

jwt:
  secret: "KzR1aW1ZRXBIV1FXT1VOWDFMVjNncUJzeE1uWkF6c0V5bHBCbXBPZU1tcz0"
  expiration-ms: 86400000

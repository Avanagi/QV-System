server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 1. Голосование (Voting Service)
        - id: voting-route
          uri: lb://VOTING-SERVICE
          predicates:
            - Path=/api/votes/**

        # 2. Проекты (Voting Service)
        - id: projects-route
          uri: lb://VOTING-SERVICE
          predicates:
            - Path=/api/projects/**

        # 3. История (History Service)
        - id: history-route
          uri: lb://HISTORY-SERVICE
          predicates:
            - Path=/api/history/**
          filters:
            - RewritePath=/api/history/(?<segment>.*), /history/$\{segment}

        # 4. Авторизация (Wallet Service)
        - id: auth-route
          uri: lb://WALLET-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/wallet/$\{segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans